<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GuardianScan — Data Breach Checker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: '#3b82f6',
          },
          keyframes: {
            scan: { '0%': { top: '0%' }, '100%': { top: '100%' } },
            pulse2: { '0%,100%': { opacity: 1 }, '50%': { opacity: 0.4 } },
          },
          animation: {
            scan: 'scan 1.4s linear infinite',
            pulse2: 'pulse2 2s ease-in-out infinite',
          }
        }
      }
    }
  </script>
  <style>
    body { background:#09090b; color:#f4f4f5; font-family:system-ui,sans-serif; }
    .scan-line { position:absolute; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,#3b82f6,transparent); animation:scan 1.4s linear infinite; }
    @keyframes scan { 0%{top:0%} 100%{top:100%} }
    .risk-bar { transition: width 0.8s ease; }
    details>summary { list-style:none; cursor:pointer; }
    details>summary::-webkit-details-marker { display:none; }
    ::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-track { background:#18181b; } ::-webkit-scrollbar-thumb { background:#3f3f46; border-radius:3px; }
  </style>
</head>
<body class="dark min-h-screen">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    // ── Icons (inline SVG) ───────────────────────────────────────────────────
    const Icon = ({ d, size=18, className="" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
        strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d={d}/>
      </svg>
    );
    const icons = {
      shield: "M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z",
      shieldCheck: "M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z M9 12l2 2 4-4",
      mail: "M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z M22 6l-10 7L2 6",
      phone: "M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z",
      user: "M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2 M12 11a4 4 0 100-8 4 4 0 000 8z",
      key: "M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4",
      hash: "M4 9h16 M4 15h16 M10 3l-4 18 M14 3l-4 18",
      globe: "M12 2a10 10 0 100 20A10 10 0 0012 2z M2 12h20 M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z",
      search: "M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z",
      eye: "M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z M12 9a3 3 0 100 6 3 3 0 000-6z",
      eyeOff: "M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24 M1 1l22 22",
      alert: "M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z M12 9v4 M12 17h.01",
      database: "M12 2a9 3 0 110 6A9 3 0 0112 2z M3 5v14a9 3 0 0018 0V5 M3 12a9 3 0 0018 0",
      chevronDown: "M6 9l6 6 6-6",
      chevronUp: "M18 15l-6-6-6 6",
      check: "M20 6L9 17l-5-5",
      x: "M18 6L6 18 M6 6l12 12",
      info: "M12 22a10 10 0 100-20 10 10 0 000 20z M12 8h.01 M12 12v4",
      zap: "M13 2L3 14h9l-1 8 10-12h-9l1-8z",
    };

    // ── Helpers ──────────────────────────────────────────────────────────────
    const fmt = (n) => n >= 1e9 ? (n/1e9).toFixed(1)+'B' : n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(0)+'K' : String(n);
    const riskColor = { safe:'text-emerald-400', low:'text-yellow-400', medium:'text-orange-400', high:'text-red-400', critical:'text-purple-400' };
    const riskBg   = { safe:'bg-emerald-400', low:'bg-yellow-400', medium:'bg-orange-400', high:'bg-red-500', critical:'bg-purple-500' };
    const riskBorder = { safe:'border-emerald-500/30', low:'border-yellow-500/30', medium:'border-orange-500/30', high:'border-red-500/30', critical:'border-purple-500/30' };
    const dcColor = (dc) => {
      const d = dc.toLowerCase();
      if (d.includes('password') || d.includes('pin')) return 'bg-red-500/20 text-red-300 border-red-500/30';
      if (d.includes('email')) return 'bg-blue-500/20 text-blue-300 border-blue-500/30';
      if (d.includes('phone')) return 'bg-yellow-500/20 text-yellow-300 border-yellow-500/30';
      if (d.includes('credit') || d.includes('bank') || d.includes('financial')) return 'bg-purple-500/20 text-purple-300 border-purple-500/30';
      if (d.includes('address') || d.includes('location')) return 'bg-green-500/20 text-green-300 border-green-500/30';
      if (d.includes('social security') || d.includes('ssn')) return 'bg-red-600/30 text-red-200 border-red-500/50';
      return 'bg-zinc-700/50 text-zinc-300 border-zinc-600/30';
    };

    const TYPES = [
      { id:'email',    label:'Email',      icon:'mail',   placeholder:'target@example.com' },
      { id:'phone',    label:'Phone',      icon:'phone',  placeholder:'+1 555 000 0000' },
      { id:'username', label:'Username',   icon:'user',   placeholder:'johndoe' },
      { id:'password', label:'Password',   icon:'key',    placeholder:'Enter password to check' },
      { id:'ip',       label:'IP Address', icon:'hash',   placeholder:'192.168.1.1' },
      { id:'domain',   label:'Domain',     icon:'globe',  placeholder:'example.com' },
    ];

    // ── Scanner component ────────────────────────────────────────────────────
    function Scanner({ onResult, isLoading, setIsLoading }) {
      const [type, setType] = useState('email');
      const [value, setValue] = useState('');
      const [showPw, setShowPw] = useState(false);
      const current = TYPES.find(t => t.id === type);

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!value.trim() || isLoading) return;
        setIsLoading(true);
        try {
          const res = await fetch('/api/breach/check', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ type, value: value.trim() }),
          });
          const data = await res.json();
          onResult(data);
        } catch {
          onResult({ error: 'Network error — make sure the server is running.' });
        } finally {
          setIsLoading(false);
        }
      };

      return (
        <div className="w-full max-w-2xl mx-auto space-y-3">
          <div className="flex rounded-xl border border-zinc-700 bg-zinc-900/60 p-1 gap-1 overflow-x-auto">
            {TYPES.map(t => (
              <button key={t.id} onClick={() => { setType(t.id); setValue(''); }}
                className={`flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm font-medium flex-shrink-0 transition-all ${
                  type === t.id ? 'bg-blue-600 text-white shadow' : 'text-zinc-400 hover:text-white hover:bg-zinc-800'
                }`}>
                <Icon d={icons[t.icon]} size={14} />
                {t.label}
              </button>
            ))}
          </div>

          <form onSubmit={handleSubmit} className="relative">
            <div className={`relative flex items-center rounded-xl border bg-zinc-900/80 overflow-hidden transition-colors ${
              isLoading ? 'border-blue-500/60' : 'border-zinc-700 focus-within:border-blue-500/60'
            }`}>
              {isLoading && <div className="scan-line pointer-events-none" />}
              <Icon d={icons[current.icon]} size={18} className="ml-4 text-zinc-500 flex-shrink-0" />
              <input
                type={type === 'password' && !showPw ? 'password' : 'text'}
                value={value}
                onChange={e => setValue(e.target.value)}
                placeholder={current.placeholder}
                className="flex-1 bg-transparent px-3 py-4 text-base text-white placeholder-zinc-600 outline-none"
                autoComplete="off"
              />
              {type === 'password' && (
                <button type="button" onClick={() => setShowPw(p => !p)}
                  className="px-3 text-zinc-500 hover:text-white transition-colors">
                  <Icon d={showPw ? icons.eyeOff : icons.eye} size={18} />
                </button>
              )}
              <button type="submit" disabled={!value.trim() || isLoading}
                className="m-2 px-5 py-2.5 rounded-lg bg-blue-600 hover:bg-blue-500 disabled:opacity-40 disabled:cursor-not-allowed text-white text-sm font-semibold flex items-center gap-2 transition-all">
                <Icon d={icons.search} size={16} />
                {isLoading ? 'Scanning…' : 'Analyze'}
              </button>
            </div>
          </form>
        </div>
      );
    }

    // ── Risk Gauge ───────────────────────────────────────────────────────────
    function RiskGauge({ score, level }) {
      return (
        <div className={`rounded-xl border p-5 bg-zinc-900/60 ${riskBorder[level]}`}>
          <div className="flex items-center justify-between mb-3">
            <span className="text-xs text-zinc-500 uppercase tracking-widest font-medium">Threat Level</span>
            <span className={`text-xs font-bold uppercase tracking-wider ${riskColor[level]}`}>{level}</span>
          </div>
          <div className="flex items-end gap-3 mb-3">
            <span className={`text-5xl font-black tabular-nums ${riskColor[level]}`}>{score}</span>
            <span className="text-zinc-600 mb-1 text-lg">/100</span>
          </div>
          <div className="h-2 rounded-full bg-zinc-800 overflow-hidden">
            <div className={`h-full rounded-full risk-bar ${riskBg[level]}`} style={{ width: score+'%' }} />
          </div>
        </div>
      );
    }

    // ── Breach Card ───────────────────────────────────────────────────────────
    function BreachCard({ source }) {
      const [open, setOpen] = useState(false);
      const rl = source.riskLevel;
      return (
        <div className={`rounded-xl border bg-zinc-900/60 overflow-hidden transition-all ${riskBorder[rl]}`}>
          <div className="p-4">
            <div className="flex items-start gap-3">
              <div className="w-10 h-10 rounded-lg bg-zinc-800 flex items-center justify-center flex-shrink-0">
                {source.logoPath
                  ? <img src={`https://haveibeenpwned.com/Content/Images/PwnedLogos/${source.logoPath}`}
                      alt={source.title} className="w-8 h-8 object-contain rounded"
                      onError={e => { e.target.style.display='none'; e.target.nextSibling.style.display='flex'; }}/>
                  : null
                }
                <div className={`w-8 h-8 items-center justify-center ${source.logoPath ? 'hidden' : 'flex'}`}>
                  <Icon d={icons.database} size={18} className="text-zinc-500"/>
                </div>
              </div>
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2 flex-wrap">
                  <span className="font-semibold text-white truncate">{source.title || source.name}</span>
                  {source.isVerified && <span className="text-xs px-1.5 py-0.5 rounded bg-emerald-500/20 text-emerald-400 border border-emerald-500/30">Verified</span>}
                  {source.isSensitive && <span className="text-xs px-1.5 py-0.5 rounded bg-red-500/20 text-red-400 border border-red-500/30">Sensitive</span>}
                  <span className={`ml-auto text-xs font-bold uppercase ${riskColor[rl]}`}>{rl}</span>
                </div>
                <div className="flex items-center gap-3 mt-1 text-xs text-zinc-500">
                  {source.date && <span>{new Date(source.date).toLocaleDateString('en-US',{month:'short',year:'numeric'})}</span>}
                  {source.domain && <span className="text-zinc-600">{source.domain}</span>}
                  {source.pwnCount && <span>{fmt(source.pwnCount)} accounts</span>}
                </div>
              </div>
            </div>
            <div className="flex flex-wrap gap-1.5 mt-3">
              {source.dataClasses.slice(0,8).map(dc => (
                <span key={dc} className={`text-xs px-2 py-0.5 rounded-full border ${dcColor(dc)}`}>{dc}</span>
              ))}
              {source.dataClasses.length > 8 && <span className="text-xs text-zinc-500">+{source.dataClasses.length - 8} more</span>}
            </div>
          </div>
          {source.description && (
            <div className="border-t border-zinc-800">
              <button onClick={() => setOpen(o=>!o)}
                className="w-full flex items-center justify-between px-4 py-2.5 text-xs text-zinc-500 hover:text-zinc-300 transition-colors">
                <span>Incident details</span>
                <Icon d={open ? icons.chevronUp : icons.chevronDown} size={14}/>
              </button>
              {open && <div className="px-4 pb-4 text-xs text-zinc-400 leading-relaxed prose-invert"
                dangerouslySetInnerHTML={{ __html: source.description }} />}
            </div>
          )}
        </div>
      );
    }

    // ── Results ───────────────────────────────────────────────────────────────
    function BreachResults({ result }) {
      if (result.error) return (
        <div className="w-full max-w-2xl mx-auto mt-6 p-4 rounded-xl border border-red-500/30 bg-red-500/10 text-red-300 text-sm">
          {result.error}
        </div>
      );

      if (!result.found || result.totalBreaches === 0) return (
        <div className="w-full max-w-2xl mx-auto mt-8 text-center">
          <div className="inline-flex items-center justify-center w-20 h-20 rounded-full bg-emerald-500/10 border border-emerald-500/30 mb-4">
            <Icon d={icons.shieldCheck} size={36} className="text-emerald-400"/>
          </div>
          <h2 className="text-2xl font-bold text-emerald-400 mb-2">No Breaches Found</h2>
          <p className="text-zinc-400 text-sm max-w-md mx-auto">{result.summary}</p>
        </div>
      );

      return (
        <div className="w-full max-w-2xl mx-auto mt-8 space-y-6">
          <div className="p-4 rounded-xl border border-zinc-700 bg-zinc-900/40 text-sm text-zinc-400 leading-relaxed">
            {result.summary}
          </div>

          <div className="grid grid-cols-3 gap-3">
            <RiskGauge score={result.riskScore} level={result.riskLevel} />
            <div className="rounded-xl border border-zinc-800 bg-zinc-900/60 p-4 flex flex-col justify-between">
              <span className="text-xs text-zinc-500 uppercase tracking-widest">Incidents</span>
              <span className="text-3xl font-black text-white mt-2">{result.totalBreaches}</span>
            </div>
            <div className="rounded-xl border border-zinc-800 bg-zinc-900/60 p-4 flex flex-col justify-between">
              <span className="text-xs text-zinc-500 uppercase tracking-widest">Records Exposed</span>
              <span className="text-3xl font-black text-white mt-2">{fmt(result.totalPwned)}</span>
            </div>
          </div>

          {result.query?.type === 'password' && (
            <div className="p-4 rounded-xl border border-red-500/40 bg-red-500/10 flex gap-3">
              <Icon d={icons.alert} size={20} className="text-red-400 flex-shrink-0 mt-0.5"/>
              <div className="text-sm text-red-300">
                <span className="font-semibold">Password compromised.</span> This exact password is in attacker databases. Change it everywhere you use it immediately.
              </div>
            </div>
          )}

          {result.tips?.length > 0 && (
            <div>
              <h3 className="text-sm font-semibold text-zinc-300 mb-3 flex items-center gap-2">
                <Icon d={icons.zap} size={16} className="text-blue-400"/>
                Recommended Actions
              </h3>
              <div className="space-y-2">
                {result.tips.map((tip, i) => (
                  <div key={i} className="flex gap-3 p-3.5 rounded-xl border border-zinc-800 bg-zinc-900/40 text-sm text-zinc-300">
                    <span className="text-blue-400 font-bold flex-shrink-0 w-5 text-center">{i+1}</span>
                    <span className="leading-relaxed">{tip}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {result.sources?.length > 0 && (
            <div>
              <h3 className="text-sm font-semibold text-zinc-300 mb-3 flex items-center gap-2">
                <Icon d={icons.database} size={16} className="text-blue-400"/>
                Data Breaches ({result.sources.length})
              </h3>
              <div className="space-y-3">
                {result.sources.map((s, i) => <BreachCard key={i} source={s}/>)}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ── Encyclopedia ─────────────────────────────────────────────────────────
    function Encyclopedia() {
      const [stats, setStats] = useState(null);
      const [catalog, setCatalog] = useState([]);
      const [search, setSearch] = useState('');

      useEffect(() => {
        fetch('/api/breach/stats').then(r=>r.json()).then(setStats).catch(()=>{});
        fetch('/api/breach/catalog').then(r=>r.json()).then(setCatalog).catch(()=>{});
      }, []);

      const filtered = catalog.filter(b =>
        !search || b.title?.toLowerCase().includes(search.toLowerCase()) ||
        b.domain?.toLowerCase().includes(search.toLowerCase())
      ).slice(0, 60);

      return (
        <div className="w-full max-w-5xl mx-auto mt-20 pb-16">
          <div className="flex items-center gap-2 mb-6">
            <Icon d={icons.database} size={20} className="text-blue-400"/>
            <h2 className="text-lg font-bold text-white">Global Threat Intelligence</h2>
          </div>

          {stats && (
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-8">
              {[
                { label:'Tracked Breaches', value: stats.totalBreaches?.toLocaleString() },
                { label:'Compromised Accounts', value: fmt(stats.totalPwnedAccounts) },
                { label:'Largest Breach', value: stats.largestBreach?.name, sub: fmt(stats.largestBreach?.pwnCount)+' records' },
                { label:'Newest Entry', value: stats.newestBreach?.name, sub: stats.newestBreach?.date },
              ].map((s,i) => (
                <div key={i} className="rounded-xl border border-zinc-800 bg-zinc-900/60 p-4">
                  <div className="text-xs text-zinc-500 uppercase tracking-widest mb-1">{s.label}</div>
                  <div className="text-xl font-bold text-white truncate">{s.value}</div>
                  {s.sub && <div className="text-xs text-zinc-500 mt-0.5 truncate">{s.sub}</div>}
                </div>
              ))}
            </div>
          )}

          <div className="relative mb-4">
            <Icon d={icons.search} size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-500"/>
            <input value={search} onChange={e=>setSearch(e.target.value)}
              placeholder="Search breach database…"
              className="w-full pl-9 pr-4 py-2.5 rounded-lg border border-zinc-700 bg-zinc-900/60 text-sm text-white placeholder-zinc-600 outline-none focus:border-blue-500/60 transition-colors"/>
          </div>

          <div className="rounded-xl border border-zinc-800 overflow-hidden">
            <table className="w-full text-sm">
              <thead>
                <tr className="border-b border-zinc-800 bg-zinc-900/80">
                  {['Organization','Domain','Breach Date','Impact','Status'].map(h => (
                    <th key={h} className="text-left px-4 py-3 text-xs text-zinc-500 uppercase tracking-wider font-medium">{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.map((b,i) => (
                  <tr key={i} className="border-b border-zinc-800/50 hover:bg-zinc-800/30 transition-colors">
                    <td className="px-4 py-3 font-medium text-white">{b.title}</td>
                    <td className="px-4 py-3 text-zinc-400">{b.domain || '—'}</td>
                    <td className="px-4 py-3 text-zinc-400">{b.breachDate ? new Date(b.breachDate).toLocaleDateString('en-US',{month:'short',year:'numeric'}) : '—'}</td>
                    <td className="px-4 py-3 text-zinc-400">{b.pwnCount ? fmt(b.pwnCount)+' accounts' : '—'}</td>
                    <td className="px-4 py-3">
                      <span className={`text-xs px-2 py-0.5 rounded-full border ${b.isVerified ? 'bg-emerald-500/15 text-emerald-400 border-emerald-500/30' : 'bg-zinc-700/50 text-zinc-400 border-zinc-600/30'}`}>
                        {b.isVerified ? 'Verified' : 'Unverified'}
                      </span>
                    </td>
                  </tr>
                ))}
                {filtered.length === 0 && (
                  <tr><td colSpan="5" className="px-4 py-8 text-center text-zinc-500">No results found</td></tr>
                )}
              </tbody>
            </table>
            {catalog.length > 60 && !search && (
              <div className="px-4 py-3 text-xs text-zinc-500 border-t border-zinc-800 text-center">
                Showing 60 of {catalog.length} breaches. Use the search to find specific entries.
              </div>
            )}
          </div>
        </div>
      );
    }

    // ── App ───────────────────────────────────────────────────────────────────
    function App() {
      const [result, setResult] = useState(null);
      const [isLoading, setIsLoading] = useState(false);

      return (
        <div className="min-h-screen bg-zinc-950">
          <header className="sticky top-0 z-50 border-b border-zinc-800/60 bg-zinc-950/80 backdrop-blur-sm">
            <div className="max-w-5xl mx-auto px-4 h-14 flex items-center gap-3">
              <Icon d={icons.shield} size={22} className="text-blue-500"/>
              <span className="font-bold text-white tracking-tight">GuardianScan</span>
              <span className="text-xs px-2 py-0.5 rounded border border-zinc-700 text-zinc-500 bg-zinc-900">v1.0.0</span>
            </div>
          </header>

          <main className="max-w-5xl mx-auto px-4">
            <div className="pt-16 pb-10 text-center">
              <h1 className="text-4xl md:text-5xl font-black text-white mb-4 leading-tight">
                Intelligence for your<br/>
                <span className="text-blue-400">digital footprint.</span>
              </h1>
              <p className="text-zinc-400 text-base mb-10 max-w-lg mx-auto">
                Search across billions of records to uncover if your personal data has been compromised in known security breaches.
              </p>
              <Scanner onResult={setResult} isLoading={isLoading} setIsLoading={setIsLoading} />
              {result && <BreachResults result={result} />}
            </div>
            <Encyclopedia />
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
